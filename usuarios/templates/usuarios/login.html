{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Iniciar Sesión | Monitoreo de Calles</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Poppins', sans-serif;
      height: 100vh;
      display: flex;
      overflow: hidden;
    }

    .container {
      display: flex;
      width: 100%;
      height: 100vh;
    }

    /* Imagen lateral con efecto glass */
    .image-section {
      flex: 1;
      position: relative;
      background: url("https://img.freepik.com/fotos-premium/toma-primer-plano-mapa-ciudad-nueva-york-marcador-rojo-colocado-parte-superior-identificar-ubicacion-especifica-representacion-navegacion-gps-estilo-minimalista-limpio-generado-ia_538213-39716.jpg") no-repeat center center;
      background-size: cover;
      background-position: center;
      image-rendering: crisp-edges;
    }

    .image-section::after {
      content: "";
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(1px);
    }

    /* Contenedor del formulario */
    .login-container {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #f5f8ff;
    }

    .login-box {
      background: #fff;
      padding: 40px;
      border-radius: 15px;
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.15);
      width: 400px;
      text-align: center;
      animation: fadeIn 0.8s ease-in-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    h1 {
      margin-bottom: 25px;
      color: #0d47a1;
      font-size: 24px;
      font-weight: 700;
    }

    form {
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .field-group {
      text-align: left;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    label {
      font-weight: 600;
      color: #333;
      font-size: 14px;
    }

    input {
      padding: 10px 12px;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 15px;
      outline: none;
      transition: all 0.2s;
    }

    input:focus {
      border-color: #0d47a1;
      box-shadow: 0 0 6px rgba(13, 71, 161, 0.25);
    }

    button {
      background-color: #0d47a1;
      color: #fff;
      border: none;
      padding: 12px;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.3s;
    }

    button:hover {
      background-color: #1565c0;
    }

    .register-link {
      margin-top: 15px;
      font-size: 14px;
      color: #444;
    }

    .register-link a {
      color: #0d47a1;
      text-decoration: none;
      font-weight: 600;
    }

    .register-link a:hover {
      text-decoration: underline;
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="image-section"></div>

    <div class="login-container">
      <div class="login-box">
        <h1>Iniciar Sesión</h1>
        <form method="POST">
          {% csrf_token %}
          <div class="field-group">
            <label for="id_username">Nombre de usuario</label>
            {{ form.username }}
          </div>

          <div class="field-group">
            <label for="id_password">Contraseña</label>
            {{ form.password }}
          </div>

          <button type="submit">Entrar</button>
        </form>

        <div class="register-link">
          ¿No tienes cuenta? <a href="{% url 'registro' %}">Regístrate aquí</a>
        </div>
      </div>
    </div>
  </div>
</body>
</html>

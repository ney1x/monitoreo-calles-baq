{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Crear nuevo reporte | Monitoreo de Calles</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

  <style>
    * {margin: 0; padding: 0; box-sizing: border-box;}
    body {
      font-family: 'Poppins', sans-serif;
      background: url("https://img.freepik.com/fotos-premium/toma-primer-plano-mapa-ciudad-nueva-york-marcador-rojo-colocado-parte-superior-identificar-ubicacion-especifica-representacion-navegacion-gps-estilo-minimalista-limpio-generado-ia_538213-39716.jpg") 
        no-repeat center center fixed;
      background-size: cover;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
    }

    body::before {
      content: "";
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.35);
      backdrop-filter: blur(3px);
    }

    .container {
      position: relative;
      background: rgba(255, 255, 255, 0.15);
      border-radius: 20px;
      padding: 40px 50px;
      width: 500px;
      text-align: center;
      color: #fff;
      box-shadow: 0 10px 25px rgba(0,0,0,0.3);
      backdrop-filter: blur(10px);
      animation: fadeIn 1s ease-in-out;
    }

    @keyframes fadeIn {
      from {opacity: 0; transform: translateY(10px);}
      to {opacity: 1; transform: translateY(0);}
    }

    h2 {
      font-size: 24px;
      margin-bottom: 25px;
      color: #fff;
    }

    form {
      display: flex;
      flex-direction: column;
      gap: 18px;
      text-align: left;
    }

    label {
      font-weight: 600;
      color: #e3f2fd;
      font-size: 15px;
    }

    input[type="text"],
    input[type="file"],
    select,
    textarea {
      width: 100%;
      padding: 10px 12px;
      border: none;
      border-radius: 10px;
      background: rgba(255,255,255,0.9);
      color: #333;
      font-size: 14px;
      outline: none;
    }

    textarea {
      min-height: 80px;
      resize: vertical;
    }

    button {
      background-color: #1565c0;
      color: white;
      padding: 12px;
      border: none;
      border-radius: 10px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      margin-top: 10px;
    }

    button:hover {
      background-color: #1e88e5;
      transform: translateY(-2px);
    }

    .back-btn {
      display: inline-block;
      margin-top: 10px;
      text-decoration: none;
      color: #bbdefb;
      font-size: 14px;
      transition: 0.3s;
    }

    .back-btn:hover {text-decoration: underline;}
  </style>
</head>
<body>
  <div class="container">
    <h2>Crear nuevo reporte</h2>

    <form method="POST" enctype="multipart/form-data">
      {% csrf_token %}

      <label for="id_tipo">Tipo:</label>
      {{ form.tipo }}

      <label for="id_descripcion">Descripción:</label>
      {{ form.descripcion }}

      <label for="id_direccion">Dirección:</label>
      {{ form.direccion }}

      <label for="id_foto">Foto:</label>
      {{ form.foto }}

      <label for="id_video">Video:</label>
      {{ form.video }}

      <button type="submit">Enviar reporte</button>
    </form>

    <a href="{% url 'mis_reportes' %}" class="back-btn">← Volver a mis reportes</a>
  </div>
</body>
</html>
